name: Gradle build

on:
  push:
    branches: [ '*' ]
  pull_request:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew build
      - name: Archive artifacts
        uses: actions/upload-artifact@v5
        with:
          name: jars
          path: |
            fabric/build/libs/blazecrop-*-fabric.jar
            neoforge/build/libs/blazecrop-*-neoforge.jar
